<script>
const P1=`<h3>Part One: When Life Was Good</h3>
<p>There was a Chuck E. Cheese on the west side of Michigan that knew his name.</p>
<p>Not literally. But it felt that way. The lady at the token counter, the guy who fixed the ski-ball machine, the flickering light above booth seven that nobody ever fixed ... they were all familiar. Comfortable. His.</p>
<p>His dad's name was Alex Sobolak. Big guy. Beard. The kind of hands that looked like they could fix anything, and usually could. He worked at Expert Heating and Cooling and he came home smelling like metal and effort and he was tired, always tired, but when his son looked up at him and asked ... <em>can we go?</em> ... he never said no.</p>
<p>Not once.</p>
<p>Even when Samantha yelled. Even when the money was tight. Even when the world outside that Chuck E. Cheese was starting to quietly, slowly, fall apart.</p>
<p>Inside those doors it was just them. Tokens. Ski-ball. Bad pizza that tasted perfect. A dad and his kid in a bubble they both pretended would last forever.</p>
<p>It didn't. Nothing does.</p>`;

const P2=`<h3>Part Two: What Hides in the Dark</h3>
<p>The year the world changed was 2019.</p>
<p>It didn't announce itself. It never does. One day you have a house and a dad who goes to work and a mom who tries, and then slowly ... so slowly you almost don't notice ... you don't.</p>
<p>They got kicked out of the house. Alex lost his job at Expert Heating and Cooling. They moved to Westland, Michigan. The hood, kind of. Not the worst place. Not the best.</p>
<p>It was fine. For a while it was fine.</p>
<p>But there was something new in the apartment. A silence that showed up at night. A stillness that wasn't sleep.</p>
<p>His dad would be standing in the kitchen. Just standing. Eyes open but not there. Like someone had hit pause on a person. Like the man inside had stepped out and left the body running on its own.</p>
<p><em>He's just tired,</em> his mom would say.</p>
<p>He was young enough to believe her.</p>
<p>The word for what was happening was fentanyl. He didn't know that word yet. He just knew something was wrong with his dad. Something was wrong with his mom too, though she hid it better. She tried so hard to hide it.</p>
<p>The addiction doesn't care how hard you try. It gets you anyway. And once it gets you, it starts working on everyone around you too. Quietly. Patiently. Like it has all the time in the world.</p>`;

const P3=`<h3>Part Three: The Arguments</h3>
<p>2021.</p>
<p>The arguments started as words. Loud words, sharp words, the kind that go through walls and find you in your bedroom at 2am even with a pillow over your head.</p>
<p>Then they became something else.</p>
<p><em>They blacked out,</em> people would say later. <em>They don't remember.</em></p>
<p>He remembered. Kids always remember. They just learn very young not to say so.</p>
<p>He was in the middle of two people who loved each other and loved him and were losing the war against something that didn't care about any of that. Fentanyl doesn't negotiate. It doesn't take days off. It doesn't look at a kid sitting on the floor of a Westland apartment and feel anything at all.</p>
<p>He learned to be quiet. To take up less space. To watch.</p>
<p>He became very good at reading rooms. At knowing when to disappear. At surviving in the margins of other people's storms.</p>
<p>Those skills would save him later. He didn't know that yet.</p>`;

const P4=`<h3>Part Four: Jenny's House</h3>
<p>2022. 2023.</p>
<p>The rent stopped getting paid. That's how it ended ... not dramatically, just practically. One morning there was nowhere to go except his grandmother's house.</p>
<p>Jennifer. Jenny. His mother's mother.</p>
<p>She had her own history with the same demons. The addiction ran in that family like a river, deep and old, carving the same channels through every generation. His mother had grown up downstream from it. That explained some things. Not all things. Nothing explains all things.</p>
<p>Jenny's house was loud and crowded and tense and his dad was barely there. Working when he could. Disappearing when he couldn't.</p>
<p>But sometimes ... sometimes ... Alex Sobolak would show up. And for a few hours he'd be present. Actually present. The real version. The Chuck E. Cheese version.</p>
<p>And his son would feel it like sunlight after a long winter.</p>
<p>Those moments were enough to hold onto. He held onto them.</p>`;

const P5=`<h3>Part Five: Grandma Mary's House</h3>
<p>There are places in a childhood that become anchors. That hold you to the earth when everything else is trying to pull you loose.</p>
<p>Grandma Mary's house was one of them.</p>
<p>His great grandmother on his mother's father's side. Real blood. Real family. The kind who bake cookies and mean it. The kind whose house smells like something warm even in winter. The kind of place where you could actually invite your friends over and stay up all night and gossip about everything and nothing ... and feel, for a little while, like a normal kid living a normal life.</p>
<p>Like the world was not what it actually was.</p>
<p>For a while, his parents stayed there too. Barely clean. Trying. His dad clean when he could manage it, which was not always. They held it together as long as they could the way they always did.</p>
<p>Which was never quite long enough.</p>
<p>Eventually they came apart again. Like always. Like gravity pulling something back to earth that was never meant to stay up.</p>
<p>But he stayed. Grandma Mary kept him. And for a little while, that was enough.</p>`;

const P6=`<h3>Part Six: The Window</h3>
<p>Fear has a sound.</p>
<p>He learned that at Grandma Mary's house.</p>
<p>It was the sound of a window sliding open at 1am. At 2am. At 3am on a school night when he was supposed to be asleep, when the rest of the street was dark and quiet and still. The sound of something heavy coming through ... 200 something pounds of his mother, finding a way in because she always found a way in. His window. Someone else's window. It didn't matter. She got in.</p>
<p>Grandma Mary didn't want her there. The rules were clear. But rules don't stop a mother who has decided she needs to be somewhere. Rules don't stop addiction. Rules don't stop 3am.</p>
<p>He would lie there in the dark listening. The scrape of the frame. The weight of footsteps crossing the floor. His own heartbeat loud in his ears.</p>
<p>School the next morning. Pretend everything was fine.</p>
<p>He was very good at pretending everything was fine.</p>
<p>Eventually the police came. His mother argued ... her stuff was inside, she was a legal tenant, she had rights. The cops could smell something wrong in the argument, something that didn't add up, but before they could press further his parents were already gone.</p>
<p>Back to the car. The one they were living in now.</p>
<p>His dad in the passenger seat. Quiet. Always quiet.</p>
<p>He didn't want to see his dad much during that time. Didn't want to look at him. Couldn't figure out what to do with what he saw.</p>
<p>It's easier sometimes to be angry than to be sad. Anger is clean. Sadness just sits there in you, heavy, taking up space, with nowhere to go.</p>`;

const P7=`<h3>Part Seven: The Birthday</h3>
<p>2024.</p>
<p>He turned another year older.</p>
<p>He woke up that morning the way you wake up on birthdays when you're a kid ... with that particular feeling in your chest, that specific excitement, the one that says <em>today is mine. Today is for me.</em></p>
<p>He went to wake his parents up.</p>
<p>His mom woke up.</p>
<p>His dad didn't.</p>
<p>Not in the way you fear. He was alive. He was just gone. Somewhere nobody could follow.</p>
<p>His mom tried. She shook him. Called his name. And then something shifted ... the way things shift when the wrong words get said or the wrong nerve gets hit ... and they were fighting. Violently. The way people fight when they are desperate and scared and have nowhere to put any of it.</p>
<p>The birthday morning became something else entirely.</p>
<p>He was lucky, honestly. Most birthdays had been good. This one wasn't. One morning out of all of them that ate itself. One day he carries not as a pattern but as a single heavy thing.</p>`;

const P8=`<h3>Part Eight: California, The First Time</h3>
<p>2025.</p>
<p>He left Michigan the first time alone.</p>
<p>Nana Peggy's house. Not his grandmother by blood ... Jenny's aunt, his mother's great-aunt, which made her something like family by a long and winding road. But she took him in like it was simple. Like it was obvious. The cookies-from-the-store kind of woman, not cookies-from-scratch, but with more warmth and more money than most and a house that felt like neither of those things needed explaining.</p>
<p>It was just him and Nana Peggy and Uncle Neil at first. Neil was good people. The kind of man who helped with projects, who showed up, who made the house feel like somewhere a person could actually land. He was grateful for Neil even when he didn't say so.</p>
<p>California was supposed to be the answer.</p>
<p>And in some ways, for a while, it was. He arrived with almost nothing and he built something anyway because that is what he does, because he has been building things out of nothing since he was old enough to understand that nobody was going to do it for him.</p>
<p>A repair business. Real money. Then more ... always more. He built things because building was the only language he had ever fully trusted. Because when the world gave you nothing, you made something. Because the alternative was sitting still and he had never learned how to do that.</p>
<p><em>Deep Fried Bread Studios.</em> Founded by a kid who refused to stop.</p>
<p>He made friends online. He fixed people's computers. He stayed up until 3am breathing life into things that didn't exist yet.</p>
<p>He was good at survival. He had been practicing his whole life.</p>
<p>But California had a weight to it that he hadn't expected.</p>
<p>Not a bad weight. Not exactly. More like the weight of a room that is too quiet after being loud for a long time. The weight of having things but not people. Of eating alone and building alone and lying awake at night with no one to call because it's 3am and everyone is asleep or far away or both.</p>
<p>His online friends were real. But they lived inside a screen and when the PC broke they disappeared into static and the room got even quieter.</p>
<p>He thought about his dad every day. He didn't say so.</p>
<p>He thought about Grandma Mary's house. About staying up all night with friends, gossiping about nothing, feeling like a normal kid. He hadn't felt like a normal kid in a long time.</p>
<p>He thought about Chuck E. Cheese. About tokens. About a big guy with a beard who always said yes.</p>
<p>Some nights the loneliness sat on his chest like something physical. Like weight. Like weather. He would lie there in the dark in California ... far from Michigan, far from the car in the parking lot, far from the window scraping open at 3am ... and feel more alone than he ever had in a crowded house full of chaos.</p>
<p>At least in the chaos there were people.</p>
<p>California was clean and stable and quiet and some nights the quiet was the loudest thing he'd ever heard.</p>
<p>But his mother was still in Michigan. So he went back.</p>`;

const P9=`<h3>Part Nine: The Second Goodbye</h3>
<p>The day he came back to Michigan to bring his mother to California started at Jenny's place.</p>
<p>His dad had been out of jail for a while by then. Not clean ... not really. That day they went to Jenny's and his dad slipped away to the neighbor's house. Said he was going to say goodbye to nana Jenny.</p>
<p>He knew. He always knew. He just didn't say so.</p>
<p>Then they went to the store.</p>
<p>His dad moved through the aisles with a particular kind of casual purpose and his son followed and somewhere in the back of his mind he already understood what was happening. He knew the way you know things you don't want to know. The way the body figures it out before the brain gives it permission.</p>
<p>His dad turned to him.</p>
<p><em>Go get my phone from the car. I'll pay from there.</em></p>
<p>He went. He got the phone.</p>
<p>He wanted to believe him. That's the thing nobody tells you about loving someone who is sick ... you keep wanting to believe them even when every piece of evidence says not to. You go get the phone because maybe this time it's different. Maybe this time the dad from Chuck E. Cheese has come back and everything is going to be okay.</p>
<p>He came back. His dad was already at the door, moving fast, putting things in the trunk.</p>
<p><em>Paid with card,</em> his dad said.</p>
<p>He looked at his dad. His dad didn't look back.</p>
<p>Not the dad he knew. The dad he knew smelled like metal and effort and took him to Chuck E. Cheese even when Samantha yelled and never once said no.</p>
<p>He didn't say anything. He just got in the car.</p>
<p>Some betrayals are too sad to be angry about. You just carry them. Add them to the pile. Keep moving.</p>`;

const P10=`<h3>Part Ten: Papa Paul's Apartment</h3>
<p>His grandfather on his dad's side. Papa Paul. Upper middle class apartment ... clean carpets, quiet hallways, the kind of building where the elevator worked and nobody was living in their car outside. A different world from every other address in this story.</p>
<p>The kind of man who tries to talk sense into his son the way fathers do ... directly, firmly, with love underneath the frustration.</p>
<p>That was the last place he saw his dad before going back to California. This time with his mother.</p>
<p>Papa Paul's apartment. His dad sitting there, being talked to, being reasoned with. Someone trying to pull Alex Sobolak back to the surface the way you try to pull someone out of deep water ... with both hands, with everything you have, knowing it might not work.</p>
<p>He said goodbye.</p>
<p>His dad didn't come to the airport. Didn't make that drive.</p>
<p>That day Alex Sobolak lost both of them. His wife and his son. Gone to California together, leaving him behind in Michigan with Papa Paul and the quiet of a nice apartment that probably felt like a different kind of empty.</p>
<p>His dad had been through worse than most people ever know. That doesn't excuse anything. It doesn't undo anything. But it's true.</p>
<p>He carried that too.</p>
<p>He left without it being enough.</p>
<p>He's been leaving without it being enough for a while now.</p>`;

const P11=`<h3>Part Eleven: California, The Second Time</h3>
<p>2026.</p>
<p>He came back to California with his mother this time.</p>
<p>Back to Nana Peggy's house. Back to the clean hallways and Uncle Neil and the stability that had started to feel like something he could trust.</p>
<p>Then his mother moved in.</p>
<p>He tried. He really did. He kept his distance. Kept his head down. Built things. Stayed busy. But the anger had been accumulating for a long time ... years of windows scraping open at 3am, of a birthday that got swallowed whole, of a life derailed before he was old enough to understand what a life even was.</p>
<p>Eventually it got to be too much. Not one dramatic moment. Just the slow accumulation of everything ... being in the same house as her, breathing the same air as her, watching her exist in the same space as the stability he'd finally found. He got mad. Not the loft kind of mad. Just quiet, heavy, done.</p>
<p>He moved to Jill and Cody's.</p>
<p>It felt more like a home and less like a hotel. Less like something temporary. More like somewhere a person could actually breathe without measuring every breath.</p>
<p>He still visited Nana Peggy. Of course he did. Some things you don't abandon just because they got complicated.</p>
<p>And one of those visits led him back to the loft.</p>
<p>His mother came upstairs.</p>
<p><em>Why are you being such a jerk.</em></p>
<p>He tried to stay quiet. He knew how to be quiet. He had learned that early, in Westland, in Jenny's house, lying still in the dark at Grandma Mary's listening to a window slide open. He had spent years learning to be quiet.</p>
<p>But she kept going. Again and again, the same way she always did, pushing at the thing he was trying to keep closed, until something in him stopped trying to keep it closed.</p>
<p>He got in her face.</p>
<p>The way his father used to.</p>
<p>The exact way. The same energy. The same ugly weight of it.</p>
<p>He knew it even while it was happening. Some part of him stepped back and watched and thought ... <em>there he is. That's Alex Sobolak. That's what it looks like from the outside.</em></p>
<p>His mother pushed him.</p>
<p>He pushed her back. Twice as hard.</p>
<p>Cody heard it. Came upstairs. Escorted him out of the house.</p>
<p>He stood outside in the California air and felt something cold settle into him. Not shame exactly. Something quieter than that. The recognition of something he hadn't wanted to see.</p>
<p>He had spent his whole life watching his father lose the war against himself. And in one afternoon in a loft in California he understood for the first time how easy it is. How the thing inside you that you hate most is also the thing most ready to come out when the pressure gets high enough.</p>
<p>He was not his father.</p>
<p>But he had been him, for a moment.</p>
<p>That moment lives in him now. He carries it the way he carries everything ... quietly, without saying so, hoping it means something. Hoping the fact that he saw it means he can choose differently next time.</p>`;

const P12=`<h3>Part Twelve: What He Won't Say Out Loud</h3>
<p>He's been getting angrier.</p>
<p>Not the quiet kind of anger he learned in Westland. Not the sitting-still-in-the-dark kind. Something louder. Something his father would recognize.</p>
<p>When he sees kids his age ... kids who grew up normally, who have no idea what any of this feels like, who've never listened for a window sliding open at 3am ... something rises in him that he doesn't have a clean word for. A distaste. Something that wants to be violent and doesn't fully know why.</p>
<p>He doesn't show his face much near kids his age. It's easier not to.</p>
<p>He knows he can be disrespectful. He knows that. He doesn't always know how to stop it in the moment even when he can see it happening. Violence has been his most reliable tool for as long as he can remember ... not because he chose it but because it was the language spoken loudest in every house he ever lived in.</p>
<p>He is not a victim. He says that clearly and he means it.</p>
<p>But he is also a kid who watched violence work. Who watched it get results. Who absorbed it the way you absorb everything you grow up inside of ... not by choosing it, just by being there long enough for it to become part of how you understand the world.</p>
<p>He is sorry for it. He says that too and he means that just as much.</p>
<p>He knows this about himself.</p>
<p>That knowing is the beginning of something. He's not sure what yet.</p>
<p>But it's there.</p>`;

const P13=`<h3>Part Thirteen: The Question</h3>
<p>It's late.</p>
<p>The motherboard is still RAM training. The stopwatch says 4 minutes 46 seconds per cycle. The MSI monitor sits dark and patient.</p>
<p>He is a kid and he has built more than most adults he knows and he is sitting in California at the edge of a decision he doesn't know how to make. Whether to stay in the life he built from nothing, with the stability and the loneliness and the things. Or go back to Michigan, to his dad, to his cousins, to the people who knew him before he became someone who builds games and fixes computers and stays up until 4am wondering what his heart is trying to say.</p>
<p>He destroyed a laptop today with his bare fists.</p>
<p>He cried because he misses.</p>
<p>He is trying to hear something underneath all the noise of everything that happened between 2019 and now. Something quiet and certain. Something that knows the answer.</p>
<p>But somewhere in Michigan, Alex Sobolak exists. Clean or not clean. Trying or not trying. Still his dad. Still the guy who never once said no to Chuck E. Cheese.</p>
<p>And somewhere in California, his son is still building.</p>
<p>Still surviving.</p>
<p>Still trying to figure out the difference between the two.</p>`;

const FIN=`<div class="final-pg"><span class="fin-orn">❧</span><span class="fin-title">To Be Continued.</span><p class="fin-sub">... By someone who has been through enough to know it's not over</p></div>`;

// Reading pages (mobile) - full text, one section each, scrollable
const rPages = [
  `<p class="ded">"For the kid who kept building."</p>`,
  `<span class="chnum">Chapter One</span><h2>Michigan</h2><span class="chyears">2019 — 2024</span><span class="chorn">❧</span>`,
  P1, P2, P3, P4, P5, P6, P7,
  `<span class="chnum">Chapter Two</span><h2>California</h2><span class="chyears">2025 — 2026</span><span class="chorn">❧</span>`,
  P8, P9, P10, P11, P12, P13,
  PFIN
];

// Desktop spreads [left, right] - full text, overflow hidden per page
const dSpreads = [
  [DED, TITLE],
  [CH1, P1],
  [P2, P3],
  [P4, P5],
  [P6, P7],
  [CH2, P8],
  [P9, P10],
  [P11, P12],
  [P13, FIN]
];

let rPage=0, dSpread=0, flipping=false;
const isMobile=()=>window.innerWidth<=680;

function openBook(){
  document.getElementById('cover-screen').style.display='none';
  isMobile() ? openReader() : openBookScreen();
}

function openReader(){
  document.getElementById('reader').style.display='flex';
  rPage=0; showRPage();
}

function closeReader(){
  document.getElementById('reader').style.display='none';
  document.getElementById('cover-screen').style.display='flex';
}

function showRPage(){
  document.getElementById('rc').innerHTML=rPages[rPage];
  document.querySelector('.reader-body').scrollTop=0;
  document.getElementById('page-num').textContent=`${rPage+1} / ${rPages.length}`;
  document.getElementById('r-prev').disabled=rPage===0;
  document.getElementById('r-next').disabled=rPage===rPages.length-1;
}

function rNext(){if(rPage<rPages.length-1){rPage++;showRPage();}}
function rPrev(){if(rPage>0){rPage--;showRPage();}}

function openBookScreen(){
  document.getElementById('book-screen').style.display='flex';
  dSpread=0; renderDS();
}

function closeBookScreen(){
  document.getElementById('book-screen').style.display='none';
  document.getElementById('cover-screen').style.display='flex';
}

function renderDS(){
  document.getElementById('bl').innerHTML=dSpreads[dSpread][0];
  document.getElementById('br').innerHTML=dSpreads[dSpread][1];
  document.getElementById('desk-num').textContent=`${dSpread+1} / ${dSpreads.length}`;
  document.getElementById('d-prev').disabled=dSpread===0;
  document.getElementById('d-next').disabled=dSpread===dSpreads.length-1;
}

function dNext(){
  if(flipping||dSpread>=dSpreads.length-1)return;
  flipping=true;
  const fc=document.getElementById('flip-c');
  const card=document.getElementById('flip-card');
  document.getElementById('flip-front').innerHTML=dSpreads[dSpread][1];
  const ns=dSpread+1;
  document.getElementById('flip-back').innerHTML=dSpreads[ns][0];
  document.getElementById('br').innerHTML=dSpreads[ns][1];
  fc.style.display='block';
  card.style.transition='none';
  card.style.transform='rotateY(0deg)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    card.style.transition='transform 0.7s cubic-bezier(0.645,0.045,0.355,1.000)';
    card.style.transform='rotateY(-180deg)';
  }));
  setTimeout(()=>{
    dSpread=ns;fc.style.display='none';renderDS();flipping=false;
  },720);
}

function dPrev(){
  if(flipping||dSpread<=0)return;
  flipping=true;
  const fc=document.getElementById('flip-c');
  const card=document.getElementById('flip-card');
  const ps=dSpread-1;
  document.getElementById('flip-back').innerHTML=dSpreads[dSpread][0];
  document.getElementById('flip-front').innerHTML=dSpreads[ps][1];
  document.getElementById('bl').innerHTML=dSpreads[ps][0];
  fc.style.display='block';
  card.style.transition='none';
  card.style.transform='rotateY(-180deg)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    card.style.transition='transform 0.7s cubic-bezier(0.645,0.045,0.355,1.000)';
    card.style.transform='rotateY(0deg)';
  }));
  setTimeout(()=>{
    dSpread=ps;fc.style.display='none';renderDS();flipping=false;
  },720);
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('book-screen').style.display==='flex'){
    if(e.key==='ArrowRight')dNext();
    if(e.key==='ArrowLeft')dPrev();
  }
  if(document.getElementById('reader').style.display==='flex'){
    if(e.key==='ArrowRight')rNext();
    if(e.key==='ArrowLeft')rPrev();
  }
});

document.getElementById('br').addEventListener('click',()=>{if(!flipping)dNext();});
document.getElementById('bl').addEventListener('click',()=>{if(!flipping)dPrev();});

window.addEventListener('resize',()=>{
  if(isMobile()&&document.getElementById('book-screen').style.display==='flex'){
    closeBookScreen();
    document.getElementById('cover-screen').style.display='none';
    openReader();
  }
});
</script>
