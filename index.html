<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Novel of Ryan</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–green: #1a3a2a;
–green-dark: #0f2219;
–green-light: #2a5a3a;
–gold: #c9a84c;
–gold-light: #e8c96d;
–paper: #f5f0e8;
–paper-dark: #ece6d4;
–ink: #1a1208;
–ink-light: #3a2f1a;
}

body {
background: #f0ebe0;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
font-family: ‘EB Garamond’, serif;
overflow: hidden;
position: relative;
}

body::before {
content: ‘’;
position: fixed;
inset: 0;
background: radial-gradient(ellipse at center, #e8e0cc 0%, #d4cbb8 100%);
z-index: -1;
}

/* === SCENE === */
#scene {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
width: 100vw;
height: 100vh;
position: relative;
}

/* === BOOK WRAPPER === */
#book-wrapper {
position: relative;
display: flex;
align-items: center;
justify-content: center;
}

/* === CLOSED BOOK === */
#closed-book {
width: 280px;
height: 380px;
position: relative;
cursor: pointer;
transition: transform 0.3s ease;
filter: drop-shadow(0 20px 60px rgba(0,0,0,0.8));
}

#closed-book:hover {
transform: translateY(-8px) rotate(-1deg);
}

#closed-book:hover .cover-glow {
opacity: 1;
}

.cover-glow {
position: absolute;
inset: -10px;
background: radial-gradient(ellipse, rgba(201,168,76,0.15) 0%, transparent 70%);
opacity: 0;
transition: opacity 0.3s;
pointer-events: none;
}

.book-3d {
width: 100%;
height: 100%;
position: relative;
transform-style: preserve-3d;
}

/* Cover face */
.cover-face {
position: absolute;
inset: 0;
background: var(–green-dark);
border-radius: 2px 6px 6px 2px;
border: 1px solid var(–green-light);
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
}

.cover-face::before {
content: ‘’;
position: absolute;
inset: 8px;
border: 1px solid rgba(201,168,76,0.3);
}

.cover-face::after {
content: ‘’;
position: absolute;
inset: 12px;
border: 1px solid rgba(201,168,76,0.15);
}

.cover-content {
text-align: center;
z-index: 1;
padding: 20px;
}

.cover-ornament-top {
color: var(–gold);
font-size: 1.4rem;
margin-bottom: 16px;
display: block;
}

.cover-main-title {
font-family: ‘Cinzel Decorative’, serif;
font-size: 1.3rem;
color: var(–gold);
line-height: 1.3;
letter-spacing: 0.05em;
text-shadow: 0 0 20px rgba(201,168,76,0.4);
margin-bottom: 12px;
}

.cover-divider {
width: 60px;
height: 1px;
background: linear-gradient(90deg, transparent, var(–gold), transparent);
margin: 12px auto;
}

.cover-years {
font-family: ‘Cinzel’, serif;
font-size: 0.7rem;
color: rgba(201,168,76,0.7);
letter-spacing: 0.3em;
text-transform: uppercase;
}

.cover-ornament-bottom {
color: var(–gold);
font-size: 1.4rem;
margin-top: 16px;
display: block;
transform: rotate(180deg);
}

/* Spine */
.book-spine {
position: absolute;
left: -18px;
top: 0;
width: 18px;
height: 100%;
background: linear-gradient(90deg, #0a1a12, var(–green-dark));
border-radius: 3px 0 0 3px;
display: flex;
align-items: center;
justify-content: center;
}

.spine-text {
font-family: ‘Cinzel’, serif;
font-size: 0.55rem;
color: rgba(201,168,76,0.6);
writing-mode: vertical-rl;
text-orientation: mixed;
transform: rotate(180deg);
letter-spacing: 0.2em;
}

/* Pages edge */
.pages-edge {
position: absolute;
right: -12px;
top: 4px;
width: 12px;
height: calc(100% - 8px);
background: repeating-linear-gradient(
to bottom,
var(–paper) 0px,
var(–paper-dark) 1px,
var(–paper) 2px
);
border-radius: 0 2px 2px 0;
box-shadow: 4px 0 8px rgba(0,0,0,0.3);
}

.click-hint {
position: absolute;
bottom: -36px;
left: 50%;
transform: translateX(-50%);
font-family: ‘EB Garamond’, serif;
font-size: 0.75rem;
color: rgba(201,168,76,0.5);
letter-spacing: 0.2em;
text-transform: uppercase;
animation: hint-pulse 2s ease-in-out infinite;
white-space: nowrap;
}

@keyframes hint-pulse {
0%, 100% { opacity: 0.5; }
50% { opacity: 1; }
}

/* === OPEN BOOK === */
#open-book {
display: none;
position: relative;
width: min(860px, 95vw);
height: min(560px, 75vh);
filter: drop-shadow(0 30px 80px rgba(0,0,0,0.9));
}

.book-open-wrapper {
width: 100%;
height: 100%;
display: flex;
position: relative;
perspective: 2000px;
}

/* Left page */
.page-left {
width: 50%;
height: 100%;
background: var(–paper);
border-radius: 6px 0 0 6px;
padding: 36px 32px 36px 40px;
overflow: hidden;
position: relative;
box-shadow: inset -4px 0 12px rgba(0,0,0,0.1);
}

.page-left::after {
content: ‘’;
position: absolute;
top: 0;
right: 0;
width: 30px;
height: 100%;
background: linear-gradient(90deg, transparent, rgba(0,0,0,0.06));
pointer-events: none;
}

/* Right page */
.page-right {
width: 50%;
height: 100%;
background: var(–paper);
border-radius: 0 6px 6px 0;
padding: 36px 40px 36px 32px;
overflow: hidden;
position: relative;
box-shadow: inset 4px 0 12px rgba(0,0,0,0.1);
}

/* Book spine when open */
.open-spine {
width: 24px;
background: linear-gradient(90deg, #0a1a12, var(–green), #0a1a12);
position: absolute;
left: 50%;
transform: translateX(-50%);
top: 0;
height: 100%;
z-index: 10;
box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* Page turning */
.turning-page {
position: absolute;
top: 0;
left: 50%;
width: 50%;
height: 100%;
transform-origin: left center;
transform-style: preserve-3d;
z-index: 20;
pointer-events: none;
display: none;
}

.tp-front, .tp-back {
position: absolute;
inset: 0;
backface-visibility: hidden;
-webkit-backface-visibility: hidden;
background: var(–paper);
overflow: hidden;
}

.tp-front {
padding: 36px 40px 36px 32px;
}

.tp-back {
transform: rotateY(180deg);
padding: 36px 32px 36px 40px;
box-shadow: inset -4px 0 12px rgba(0,0,0,0.1);
}

.tp-front::before {
content: ‘’;
position: absolute;
left: 0;
top: 0;
width: 30px;
height: 100%;
background: linear-gradient(90deg, rgba(0,0,0,0.08), transparent);
pointer-events: none;
}

@keyframes flip-forward {
0% { transform: rotateY(0deg); box-shadow: 4px 0 20px rgba(0,0,0,0.3); }
50% { box-shadow: -20px 0 40px rgba(0,0,0,0.5); }
100% { transform: rotateY(-180deg); box-shadow: -4px 0 20px rgba(0,0,0,0.3); }
}

@keyframes flip-backward {
0% { transform: rotateY(-180deg); }
100% { transform: rotateY(0deg); }
}

.turning-page.flip-forward {
animation: flip-forward 0.65s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.turning-page.flip-backward {
animation: flip-backward 0.65s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

/* === PAGE CONTENT STYLES === */
.page-content {
height: 100%;
display: flex;
flex-direction: column;
color: var(–ink);
font-size: clamp(0.75rem, 1.4vw, 0.92rem);
line-height: 1.75;
position: relative;
}

.part-title {
font-family: ‘Cinzel’, serif;
font-size: clamp(0.65rem, 1.1vw, 0.78rem);
color: var(–ink-light);
letter-spacing: 0.08em;
margin-bottom: 14px;
padding-bottom: 6px;
border-bottom: 1px solid rgba(26,18,8,0.15);
}

.page-content p {
margin-bottom: 8px;
text-align: justify;
hyphens: auto;
}

.page-content p:first-of-type::first-letter {
font-size: 2.5em;
float: left;
line-height: 0.8;
margin: 4px 6px 0 0;
font-family: ‘Cinzel Decorative’, serif;
color: var(–green);
}

.part-title + p::first-letter {
font-size: 2.5em;
float: left;
line-height: 0.8;
margin: 4px 6px 0 0;
font-family: ‘Cinzel Decorative’, serif;
color: var(–green);
}

.page-break {
text-align: center;
color: rgba(26,18,8,0.3);
margin: 12px 0;
font-size: 1.1rem;
}

/* Special page types */
.cover-page-inner {
height: 100%;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
border: 1px solid rgba(26,18,8,0.1);
margin: 10px;
}

.title-page-content {
height: 100%;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
color: var(–ink);
}

.title-page-content .book-title {
font-family: ‘Cinzel Decorative’, serif;
font-size: clamp(1rem, 2vw, 1.4rem);
color: var(–green);
line-height: 1.3;
margin-bottom: 16px;
}

.title-page-content .book-author {
font-family: ‘Cinzel’, serif;
font-size: clamp(0.7rem, 1.2vw, 0.85rem);
letter-spacing: 0.2em;
color: var(–ink-light);
margin-bottom: 8px;
}

.title-page-content .book-years {
font-family: ‘EB Garamond’, serif;
font-size: 0.8rem;
color: rgba(26,18,8,0.4);
letter-spacing: 0.1em;
}

.title-ornament {
color: var(–green);
font-size: 1.5rem;
margin: 16px 0;
}

.blank-page-content {
height: 100%;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
}

.dedication {
font-style: italic;
color: rgba(26,18,8,0.5);
font-size: 0.85rem;
}

.chapter-page-content {
height: 100%;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
color: var(–ink);
}

.chapter-number {
font-family: ‘Cinzel’, serif;
font-size: 0.7rem;
letter-spacing: 0.4em;
text-transform: uppercase;
color: rgba(26,18,8,0.4);
margin-bottom: 12px;
}

.chapter-title {
font-family: ‘Cinzel Decorative’, serif;
font-size: clamp(1.4rem, 3vw, 2.2rem);
color: var(–green);
margin-bottom: 12px;
}

.chapter-years {
font-family: ‘EB Garamond’, serif;
font-style: italic;
color: rgba(26,18,8,0.4);
font-size: 0.85rem;
}

.chapter-ornament {
font-size: 1.5rem;
color: rgba(26,18,8,0.15);
margin-top: 20px;
}

.final-page-content {
height: 100%;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
color: var(–ink);
}

.final-ornament {
font-size: 2rem;
color: var(–green);
margin-bottom: 20px;
}

.final-title {
font-family: ‘Cinzel Decorative’, serif;
font-size: clamp(1rem, 2.5vw, 1.6rem);
color: var(–green);
margin-bottom: 16px;
}

.final-sub {
font-style: italic;
color: rgba(26,18,8,0.5);
font-size: 0.8rem;
max-width: 200px;
line-height: 1.6;
}

.page-number {
position: absolute;
bottom: 8px;
font-family: ‘Cinzel’, serif;
font-size: 0.6rem;
color: rgba(26,18,8,0.3);
letter-spacing: 0.15em;
}

.page-number.left { left: 0; }
.page-number.right { right: 0; }

/* === NAVIGATION === */
#nav-controls {
position: fixed;
bottom: 30px;
left: 50%;
transform: translateX(-50%);
display: none;
align-items: center;
gap: 20px;
z-index: 100;
}

.nav-btn {
background: var(–green-dark);
border: 1px solid var(–gold);
color: var(–gold);
width: 44px;
height: 44px;
border-radius: 50%;
font-size: 1.1rem;
cursor: pointer;
transition: all 0.2s;
display: flex;
align-items: center;
justify-content: center;
}

.nav-btn:hover:not(:disabled) {
background: var(–green);
box-shadow: 0 0 20px rgba(201,168,76,0.3);
}

.nav-btn:disabled {
opacity: 0.3;
cursor: not-allowed;
}

#page-indicator {
font-family: ‘Cinzel’, serif;
font-size: 0.7rem;
color: var(–green-dark);
letter-spacing: 0.2em;
min-width: 80px;
text-align: center;
}

/* === READING MODE (MOBILE) === */
#reading-mode-btn {
position: fixed;
top: 16px;
right: 16px;
background: var(–green-dark);
border: 1px solid var(–gold);
color: var(–gold);
font-family: ‘Cinzel’, serif;
font-size: 0.65rem;
letter-spacing: 0.15em;
padding: 8px 14px;
border-radius: 4px;
cursor: pointer;
display: none;
z-index: 200;
transition: all 0.2s;
}

#reading-mode-btn:hover {
background: var(–green);
border-color: var(–gold);
}

#reading-overlay {
display: none;
position: fixed;
inset: 0;
background: var(–paper);
z-index: 300;
flex-direction: column;
overflow: hidden;
}

.reading-header {
background: var(–green-dark);
padding: 12px 20px;
display: flex;
align-items: center;
justify-content: space-between;
}

.reading-header-title {
font-family: ‘Cinzel’, serif;
font-size: 0.65rem;
color: var(–gold);
letter-spacing: 0.2em;
}

#close-reading {
background: none;
border: 1px solid rgba(201,168,76,0.3);
color: var(–gold);
font-size: 0.7rem;
padding: 4px 10px;
border-radius: 3px;
cursor: pointer;
font-family: ‘Cinzel’, serif;
}

.reading-text-area {
flex: 1;
overflow-y: auto;
padding: 30px 24px;
color: var(–ink);
font-family: ‘EB Garamond’, serif;
font-size: 1.05rem;
line-height: 1.85;
}

.reading-text-area .r-part-title {
font-family: ‘Cinzel’, serif;
font-size: 0.8rem;
color: var(–green);
letter-spacing: 0.1em;
margin: 24px 0 12px;
padding-bottom: 6px;
border-bottom: 1px solid rgba(26,18,8,0.1);
}

.reading-text-area p {
margin-bottom: 12px;
text-align: justify;
hyphens: auto;
}

.reading-text-area .r-chapter {
text-align: center;
margin: 32px 0;
}

.reading-text-area .r-chapter-num {
font-family: ‘Cinzel’, serif;
font-size: 0.7rem;
letter-spacing: 0.4em;
color: rgba(26,18,8,0.4);
display: block;
margin-bottom: 8px;
}

.reading-text-area .r-chapter-title {
font-family: ‘Cinzel Decorative’, serif;
font-size: 1.6rem;
color: var(–green);
display: block;
margin-bottom: 6px;
}

.reading-text-area .r-page-break {
text-align: center;
color: rgba(26,18,8,0.2);
margin: 20px 0;
}

.reading-footer {
background: var(–paper-dark);
border-top: 1px solid rgba(26,18,8,0.1);
padding: 12px 20px;
display: flex;
align-items: center;
justify-content: space-between;
}

.reading-nav-btn {
background: var(–green-dark);
border: 1px solid rgba(201,168,76,0.3);
color: var(–gold);
width: 44px;
height: 44px;
border-radius: 50%;
font-size: 1.2rem;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
}

.reading-nav-btn:disabled { opacity: 0.3; }

#reading-page-num {
font-family: ‘Cinzel’, serif;
font-size: 0.65rem;
color: rgba(26,18,8,0.5);
letter-spacing: 0.2em;
}

/* Book shadow */
.book-shadow {
position: absolute;
bottom: -20px;
left: 50%;
transform: translateX(-50%);
width: 90%;
height: 20px;
background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%);
filter: blur(8px);
}

/* Close button for book */
#close-book-btn {
position: fixed;
top: 16px;
left: 16px;
background: var(–green-dark);
border: 1px solid var(–gold);
color: var(–gold);
font-family: ‘Cinzel’, serif;
font-size: 0.65rem;
letter-spacing: 0.15em;
padding: 8px 14px;
border-radius: 4px;
cursor: pointer;
display: none;
z-index: 200;
}

/* Responsive */
@media (max-width: 768px) {
#open-book {
width: 95vw;
height: 70vh;
}

#reading-mode-btn {
display: block;
}

.page-content {
font-size: 0.7rem;
line-height: 1.6;
}

.page-left, .page-right {
padding: 20px 16px 20px 20px;
}
}

@media (max-width: 500px) {
#closed-book {
width: 220px;
height: 300px;
}
}
</style>

</head>

<script>
// =====================
// PAGE CONTENT
// =====================

const pages = [

  // 0: Left blank / dedication
  `<div class="blank-page-content"><p class="dedication">"For the kid who kept building."</p></div>`,

  // 1: Title page
  `<div class="title-page-content">
    <div class="book-title">The Novel<br>of Ryan</div>
    <div class="title-ornament">❦</div>
    <div class="book-author">Ryan Sobolak</div>
    <div class="book-years">2019 — 2026</div>
  </div>`,

  // 2: Blank
  `<div class="blank-page-content"></div>`,

  // 3: Chapter 1 header
  `<div class="chapter-page-content">
    <p class="chapter-number">Chapter One</p>
    <h2 class="chapter-title">Michigan</h2>
    <p class="chapter-years">2019 — 2024</p>
    <div class="chapter-ornament">❧</div>
  </div>`,

  // 4: Part One
  `<div class="page-content">
    <h3 class="part-title">Part One: When Life Was Good</h3>
    <p>There was a Chuck E. Cheese on the west side of Michigan that knew his name.</p>
    <p>Not literally. But it felt that way. The lady at the token counter, the guy who fixed the ski-ball machine, the flickering light above booth seven that nobody ever fixed ... they were all familiar. Comfortable. His.</p>
    <p>His dad's name was Alex Sobolak. Big guy. Beard. The kind of hands that looked like they could fix anything, and usually could. He worked at Expert Heating and Cooling and he came home smelling like metal and effort and he was tired, always tired, but when his son looked up at him and asked ... <em>can we go?</em> ... he never said no.</p>
    <p>Not once.</p>
    <p>Even when Samantha yelled. Even when the money was tight. Even when the world outside that Chuck E. Cheese was starting to quietly, slowly, fall apart.</p>
    <p>Inside those doors it was just them. Tokens. Ski-ball. Bad pizza that tasted perfect. A dad and his kid in a bubble they both pretended would last forever.</p>
    <p>It didn't.</p>
    <p>Nothing does.</p>
    <span class="page-number left">4</span>
  </div>`,

  // 5: Part Two
  `<div class="page-content">
    <h3 class="part-title">Part Two: What Hides in the Dark</h3>
    <p>The year the world changed was 2019.</p>
    <p>It didn't announce itself. It never does. One day you have a house and a dad who goes to work and a mom who tries, and then slowly ... so slowly you almost don't notice ... you don't.</p>

  if (index === null || index === undefined) {

// =====================
// PAGE FLIP
// =====================
function nextSpread() {
  if (isAnimating || currentSpread >= spreads.length - 1) return;
  isAnimating = true;

  const tp = document.getElementById('turning-page');
  const tpFront = document.getElementById('tp-front');
  const tpBack = document.getElementById('tp-back');

  // Front of turning page = current right page content
  const [, curRight] = spreads[currentSpread];
  tpFront.innerHTML = renderPage(curRight);

  // Next spread
  currentSpread++;
  const [nextLeft, nextRight] = spreads[currentSpread];

  // Back of turning page = next left page content  
  tpBack.innerHTML = renderPage(nextLeft);

  // Update the actual right page (hidden behind turning page)
  document.getElementById('page-right').innerHTML = renderPage(nextRight);

  // Show and animate turning page
  tp.style.display = 'block';
  tp.classList.remove('flip-backward');
  void tp.offsetWidth; // force reflow
  tp.classList.add('flip-forward');

  setTimeout(() => {
    tp.style.display = 'none';
    tp.classList.remove('flip-forward');
    // Update left page
    document.getElementById('page-left').innerHTML = renderPage(nextLeft);
    updateNavButtons();
    isAnimating = false;
  }, 680);
}

function prevSpread() {
  if (isAnimating || currentSpread <= 0) return;
  isAnimating = true;

  const tp = document.getElementById('turning-page');
  const tpFront = document.getElementById('tp-front');
  const tpBack = document.getElementById('tp-back');

  // Going backward: turning page starts flipped (showing current left)
  const [curLeft,] = spreads[currentSpread];
  tpBack.innerHTML = renderPage(curLeft);

  // Previous spread
  currentSpread--;
  const [prevLeft, prevRight] = spreads[currentSpread];

  // Front of turning page = prev right page
  tpFront.innerHTML = renderPage(prevRight);

  // Update left page (hidden)
  document.getElementById('page-left').innerHTML = renderPage(prevLeft);

  // Show turning page starting from flipped position
  tp.style.display = 'block';
  tp.style.transform = 'rotateY(-180deg)';
  tp.classList.remove('flip-forward');
  void tp.offsetWidth;
  tp.style.transform = '';
  tp.classList.add('flip-backward');

  setTimeout(() => {
    tp.style.display = 'none';
    tp.classList.remove('flip-backward');
    document.getElementById('page-right').innerHTML = renderPage(prevRight);
    updateNavButtons();
    isAnimating = false;
  }, 680);
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (!isOpen) return;
  if (e.key === 'ArrowRight') nextSpread();
  if (e.key === 'ArrowLeft') prevSpread();
});

// Click pages to turn

  if (isOpen && !isAnimating) nextSpread();
});

  <p>Jennifer. Jenny. His mother's mother. She had her own history with the same demons. The addiction ran in that family like a river, deep and old, carving the same channels through every generation.</p>
  <p>Jenny's house was loud and crowded and tense and his dad was barely there. Working when he could. Disappearing when he couldn't.</p>
  <p>But sometimes ... sometimes ... Alex Sobolak would show up. And for a few hours he'd be present. Actually present. The real version. The Chuck E. Cheese version.</p>
  <p>And his son would feel it like sunlight after a long winter. Those moments were enough to hold onto. He held onto them.</p>`,

  `<p class="r-part-title">Part Five: Grandma Mary's House</p>
  <p>There are places in a childhood that become anchors. That hold you to the earth when everything else is trying to pull you loose.</p>
  <p>Grandma Mary's house was one of them.</p>
  <p>His great grandmother on his mother's father's side. Real blood. Real family. The kind who bake cookies and mean it. The kind whose house smells like something warm even in winter. The kind of place where you could actually invite your friends over and stay up all night and gossip about everything and nothing ... and feel, for a little while, like a normal kid living a normal life.</p>
  <p>For a while, his parents stayed there too. Barely clean. Trying. They held it together as long as they could the way they always did. Which was never quite long enough.</p>
  <p>But he stayed. Grandma Mary kept him. And for a little while, that was enough.</p>`,

  `<p class="r-part-title">Part Six: The Window</p>
  <p>Fear has a sound.</p>
  <p>He learned that at Grandma Mary's house.</p>
  <p>It was the sound of a window sliding open at 1am. At 2am. At 3am on a school night when he was supposed to be asleep. The sound of something heavy coming through ... 200 something pounds of his mother, finding a way in because she always found a way in.</p>
  <p>Grandma Mary didn't want her there. The rules were clear. But rules don't stop a mother who has decided she needs to be somewhere. Rules don't stop addiction. Rules don't stop 3am.</p>
  <p>He would lie there in the dark listening. The scrape of the frame. The weight of footsteps crossing the floor. His own heartbeat loud in his ears.</p>
  <p>School the next morning. Pretend everything was fine. He was very good at pretending everything was fine.</p>
  <p>Eventually the police came. Before they could press further, his parents were already gone. Back to the car. The one they were living in now. His dad in the passenger seat. Quiet. Always quiet.</p>`,

  `<p class="r-part-title">Part Seven: The Birthday</p>
  <p>2024.</p>
  <p>He turned another year older.</p>
  <p>He woke up that morning the way you wake up on birthdays when you're a kid ... with that particular feeling in your chest, that specific excitement, the one that says <em>today is mine. Today is for me.</em></p>
  <p>He went to wake his parents up. His mom woke up. His dad didn't.</p>
  <p>Not in the way you fear. He was alive. He was just gone. Somewhere nobody could follow.</p>
  <p>His mom tried. She shook him. Called his name. And then something shifted ... and they were fighting. Violently. The way people fight when they are desperate and scared and have nowhere to put any of it.</p>
  <p>The birthday morning became something else entirely.</p>
  <p>He was lucky, honestly. Most birthdays had been good. This one wasn't. One day he carries not as a pattern but as a single heavy thing.</p>`,

  `<div class="r-chapter"><span class="r-chapter-num">Chapter Two</span><span class="r-chapter-title">California</span><em style="color:rgba(26,18,8,0.4);font-size:0.85rem;">2025 — 2026</em></div>`,

  `<p class="r-part-title">Part Eight: California, The First Time</p>
  <p>2025. He left Michigan the first time alone.</p>
  <p>Nana Peggy's house. Not his grandmother by blood ... Jenny's aunt, his mother's great-aunt, which made her something like family by a long and winding road. But she took him in like it was simple. Like it was obvious. The cookies-from-the-store kind of woman, not cookies-from-scratch, but with more warmth and more money than most.</p>
  <p>It was just him and Nana Peggy and Uncle Neil at first. Neil was good people. The kind of man who helped with projects, who showed up, who made the house feel like somewhere a person could actually land.</p>
  <p>California was supposed to be the answer. And in some ways, for a while, it was. He arrived with almost nothing and built something anyway. A repair business. Real money. Then more ... always more. He built things because building was the only language he had ever fully trusted.</p>
  <p><em>Deep Fried Bread Studios.</em> Founded by a kid who refused to stop.</p>`,

  `<p>But California had a weight to it that he hadn't expected.</p>
  <p>More like the weight of a room that is too quiet after being loud for a long time. The weight of having things but not people. Of eating alone and building alone and lying awake at night with no one to call because it's 3am and everyone is asleep or far away or both.</p>
  <p>His online friends were real. But they lived inside a screen and when the PC broke they disappeared into static and the room got even quieter.</p>
  <p>He thought about his dad every day. He didn't say so.</p>
  <p>He thought about Grandma Mary's house. About staying up all night with friends, feeling like a normal kid. He hadn't felt like a normal kid in a long time.</p>
  <p>He thought about Chuck E. Cheese. About tokens. About a big guy with a beard who always said yes.</p>
  <p>Some nights the loneliness sat on his chest like something physical. Like weight. Like weather.</p>
  <p>California was clean and stable and quiet and some nights the quiet was the loudest thing he'd ever heard. But his mother was still in Michigan. So he went back.</p>`,

  `<p class="r-part-title">Part Nine: The Second Goodbye</p>
  <p>The day he came back to Michigan to bring his mother to California started at Jenny's place.</p>
  <p>His dad had been out of jail for a while by then. Not clean ... not really. His dad slipped away to the neighbor's house. Said he was going to say goodbye to nana Jenny.</p>
  <p>He knew. He always knew. He just didn't say so.</p>
  <p>Then they went to the store. His dad turned to him: <em>Go get my phone from the car. I'll pay from there.</em></p>
  <p>He went. He got the phone. He wanted to believe him. That's the thing nobody tells you about loving someone who is sick ... you keep wanting to believe them even when every piece of evidence says not to.</p>
  <p>He came back. His dad was already at the door, moving fast, putting things in the trunk.</p>
  <p><em>Paid with card,</em> his dad said. He looked at his dad. His dad didn't look back.</p>
  <p>Not the dad he knew. The dad he knew smelled like metal and effort and took him to Chuck E. Cheese and never once said no.</p>
  <p>Some betrayals are too sad to be angry about. You just carry them. Add them to the pile. Keep moving.</p>`,

  `<p class="r-part-title">Part Ten: Papa Paul's Apartment</p>
  <p>His grandfather on his dad's side. Papa Paul. Upper middle class apartment ... clean carpets, quiet hallways, the kind of building where the elevator worked and nobody was living in their car outside. A different world from every other address in this story.</p>
  <p>That was the last place he saw his dad before going back to California. This time with his mother.</p>
  <p>His dad sitting there, being talked to, being reasoned with. Someone trying to pull Alex Sobolak back to the surface the way you try to pull someone out of deep water ... with both hands, with everything you have, knowing it might not work.</p>
  <p>His dad didn't come to the airport. Didn't make that drive.</p>
  <p>That day Alex Sobolak lost both of them. His wife and his son. Gone to California together, leaving him behind.</p>
  <p>His dad had been through worse than most people ever know. That doesn't excuse anything. It doesn't undo anything. But it's true.</p>
  <p>He's been leaving without it being enough for a while now.</p>`,

  `<p class="r-part-title">Part Eleven: California, The Second Time</p>
  <p>2026. He came back to California with his mother this time. Back to Nana Peggy's house. Back to Uncle Neil and the stability that had started to feel like something he could trust.</p>
  <p>Then his mother moved in. He tried. He really did. But the anger had been accumulating for a long time ... years of windows scraping open at 3am, of a birthday that got swallowed whole, of a life derailed before he was old enough to understand what a life even was.</p>
  <p>Eventually it got to be too much. Just quiet, heavy, done. He moved to Jill and Cody's. It felt more like a home and less like a hotel. More like somewhere a person could actually breathe.</p>
  <p>He still visited Nana Peggy. Some things you don't abandon just because they got complicated. And one of those visits led him back to the loft.</p>`,

  `<p>His mother came upstairs. <em>Why are you being such a jerk.</em></p>
  <p>He tried to stay quiet. He knew how to be quiet. He had spent years learning to be quiet.</p>
  <p>But she kept going. Again and again, pushing at the thing he was trying to keep closed, until something in him stopped trying to keep it closed.</p>
  <p>He got in her face. The way his father used to. The exact way. The same energy. The same ugly weight of it.</p>
  <p>He knew it even while it was happening. Some part of him stepped back and watched and thought ... <em>there he is. That's Alex Sobolak. That's what it looks like from the outside.</em></p>
  <p>His mother pushed him. He pushed her back. Twice as hard. Cody heard it. Came upstairs. Escorted him out of the house.</p>
  <p>He stood outside in the California air and felt something cold settle into him. The recognition of something he hadn't wanted to see.</p>
  <p>He was not his father. But he had been him, for a moment. That moment lives in him now.</p>`,

  `<p class="r-part-title">Part Twelve: What He Won't Say Out Loud</p>
  <p>He's been getting angrier. Not the quiet kind of anger he learned in Westland. Something louder. Something his father would recognize.</p>
  <p>When he sees kids his age ... kids who grew up normally, who've never listened for a window sliding open at 3am ... something rises in him that he doesn't have a clean word for. A distaste. Something that wants to be violent and doesn't fully know why.</p>
  <p>He doesn't show his face much near kids his age. It's easier not to.</p>
  <p>He knows he can be disrespectful. Violence has been his most reliable tool for as long as he can remember ... not because he chose it but because it was the language spoken loudest in every house he ever lived in.</p>
  <p>He is not a victim. He says that clearly and he means it.</p>
  <p>But he is also a kid who watched violence work. Who absorbed it the way you absorb everything you grow up inside of.</p>
  <p>He is sorry for it. That knowing is the beginning of something. He's not sure what yet. But it's there.</p>`,

  `<p class="r-part-title">Part Thirteen: The Question</p>
  <p>It's late. The motherboard is still RAM training. The stopwatch says 4 minutes 46 seconds per cycle. The MSI monitor sits dark and patient.</p>
  <p>He is a kid and he has built more than most adults he knows and he is sitting in California at the edge of a decision he doesn't know how to make. Whether to stay in the life he built from nothing, with the stability and the loneliness and the things. Or go back to Michigan, to his dad, to his cousins, to the people who knew him before.</p>
  <p>He destroyed a laptop today with his bare fists. He cried because he misses.</p>
  <p>He is trying to hear something underneath all the noise of everything that happened between 2019 and now. Something quiet and certain. Something that knows the answer.</p>
  <p>But somewhere in Michigan, Alex Sobolak exists. Clean or not clean. Trying or not trying. Still his dad. Still the guy who never once said no to Chuck E. Cheese.</p>
  <p>And somewhere in California, his son is still building. Still surviving. Still trying to figure out the difference between the two.</p>`,

let rPage = 0;

function openReadingMode() {
  document.getElementById('reading-overlay').style.display = 'flex';
  rPage = 0;
  showRPage();
}

function closeReadingMode() {
  document.getElementById('reading-overlay').style.display = 'none';
}

function showRPage() {
  document.getElementById('reading-text-area').innerHTML = readingPages[rPage];
  document.getElementById('reading-text-area').scrollTop = 0;
  document.getElementById('reading-page-num').textContent = `Page ${rPage + 1} of ${readingPages.length}`;
  document.getElementById('r-prev').disabled = rPage === 0;
  document.getElementById('r-next').disabled = rPage === readingPages.length - 1;
}

function rNext() {
  if (rPage < readingPages.length - 1) { rPage++; showRPage(); }
}

function rPrev() {
  if (rPage > 0) { rPage--; showRPage(); }
}

// Click right page on open book to go forward
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('page-right').addEventListener('click', () => {
    if (isOpen && !isAnimating) nextSpread();
  });
  document.getElementById('page-left').addEventListener('click', () => {
    if (isOpen && !isAnimating) prevSpread();
  });
});
</script>
